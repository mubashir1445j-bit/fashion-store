    </style>
</head>
<body>
    <h1>Elite Fashion Hub</h1>
    <p>Trending products for you!</p>

    <div id="dress1" class="product">
        <h3>Stylish Summer Dress</h3>
        <a href="#" class="btn">Shop Now</a>
    </div>

    <div id="dress2" class="product">
        <h3>Casual Classic Shoes</h3>
        <a href="#" class="btn">Shop Now</a>
    </div>
</body>
</html>
