<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Fashion Hub - Premium Store</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; text-align: center; }
        header { background: #232f3e; color: white; padding: 20px; }
        
        /* Modern Grid Layout */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
            max-width: 1200px; 
            margin: auto; 
        }
        
        .product { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .product:hover { transform: scale(1.02); }
        
        .product img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
        .product h3 { margin: 15px 0 10px; font-size: 18px; color: #333; }
        .price { font-size: 20px; color: #b12704; font-weight: bold; margin-bottom: 15px; }
        
        .btn { 
            display: block; 
            background: #ff9900; 
            color: #111; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <header>
        <h1>Elite Fashion Hub</h1>
        <p>Trending Co-ord Sets & Premium Fashion</p>
    </header>

    <div class="product-grid">
        <div class="product">
            <img src="https://via.placeholder.com/300" alt="Product">
            <h3>Luxury Silk Co-ord Set</h3>
            <p class="price">$49.99</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
        
        <div class="product">
            <img src="https://via.placeholder.com/300" alt="Product">
            <h3>Summer Floral Set</h3>
            <p class="price">$39.99</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
    </div>

</body>
</html>
